name: crj_soundscape
description: "CRJ SoundScape — Sacred audio analysis & composition for Indian classical music"
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  just_audio: ^0.9.36
  record: ^6.0.0
  path_provider: ^2.1.0
  webview_flutter: ^4.4.0
  provider: ^6.1.0
  google_fonts: ^6.1.0
  file_picker: ^10.0.0
  share_plus: ^12.0.0
  permission_handler: ^12.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
