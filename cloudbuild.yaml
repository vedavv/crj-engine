# Google Cloud Build — build and deploy to Cloud Run
# Manual: gcloud builds submit --config cloudbuild.yaml
# Auto:   configure trigger on push to main branch

substitutions:
  _TAG: latest

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crj-soundscape:${_TAG}'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/crj-soundscape:${_TAG}'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'crj-soundscape'
      - '--image'
      - 'gcr.io/$PROJECT_ID/crj-soundscape:${_TAG}'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '600'
      - '--concurrency'
      - '3'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/crj-soundscape:${_TAG}'

timeout: '1200s'
